<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Brownie Bliss</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <script>
      if (sessionStorage.getItem('adminToken')) {
        window.location.replace('admin.html');
      }
    </script>
    <style>
        body {
            background: var(--cream);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .login-box {
            background: var(--white);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 8px 40px rgba(26, 9, 5, 0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-box h2 {
            font-family: 'Playfair Display', serif;
            color: var(--brown-dark);
            margin-bottom: 8px;
        }

        .login-box p {
            color: var(--text-mid);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--brown-dark);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--cream-dark);
            border-radius: 4px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: var(--gold);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--brown-dark);
            color: var(--white);
            border: none;
            border-radius: 4px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }

        .login-btn:hover {
            background: var(--gold);
            color: var(--brown-dark);
        }

        .error-msg {
            color: var(--brand-red);
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <div style="font-size: 40px; margin-bottom: 16px;">🍫</div>
        <h2>Admin Access</h2>
        <p>Please log in to manage orders.</p>

        <form id="loginForm">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="login-btn">Log In</button>
            <div class="error-msg" id="errorMsg">Invalid username or password</div>
        </form>

        <div style="margin-top: 24px; font-size: 13px;">
            <a href="index.html" style="color: var(--text-mid); text-decoration: none;">&larr; Back to Shop</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            errorMsg.style.display = 'none';

            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });

                const data = await res.json();
                if (!res.ok || !data.success) {
                    errorMsg.textContent = data.message || 'Invalid username or password';
                    errorMsg.style.display = 'block';
                    return;
                }

                sessionStorage.setItem('adminToken', data.token);
                sessionStorage.setItem('adminLoggedIn', 'true');
                window.location.replace('admin.html');
            } catch (err) {
                errorMsg.textContent = 'Login failed. Please try again.';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
